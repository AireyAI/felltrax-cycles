<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Felltrax Cycles | Mountain Bikes, Carlisle</title>
  <meta name="description" content="Premium nearly-new mountain bikes at unbeatable prices. Trail, enduro and e-MTB specialists in Carlisle. Felltrax Cycles.">
  <link rel="canonical" href="https://www.felltraxcycles.co.uk/shop">

  <!-- Open Graph -->
  <meta property="og:title" content="Shop — Felltrax Cycles">
  <meta property="og:description" content="Premium nearly-new mountain bikes at unbeatable prices. Trail, enduro and e-MTB specialists.">
  <meta property="og:image" content="images/hero-bg.jpg">
  <meta property="og:url" content="https://www.felltraxcycles.co.uk/shop">
  <meta property="og:type" content="website">

  <!-- Theme -->
  <meta name="theme-color" content="#0A0A0A">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#C4FF2B', 'brand-dark': '#9ACC1A', 'brand-light': '#D6FF6B',
            fell: { 950:'#0A0A0A',900:'#111111',850:'#161616',800:'#1A1A1A',700:'#242424',600:'#333333',500:'#555555',400:'#777777',300:'#999999',200:'#BBBBBB',100:'#E0E0E0' },
            mud: '#8B6914', moss: '#2D5016', rock: '#6B6B6B',
          },
          fontFamily: { display: ['Oswald','sans-serif'], body: ['DM Sans','sans-serif'] },
        },
      },
    }
  </script>

  <!-- Theme (before paint) -->
  <script src="js/theme.js"></script>

  <!-- Shared CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Nav placeholder -->
  <div id="nav-placeholder"></div>

  <!-- ═══════════════════ PAGE HEADER ═══════════════════ -->
  <section class="page-header">
    <p class="section-label" data-appear>Our Range</p>
    <h1 class="section-title" data-split="words">Premium Bikes. <span style="color: var(--brand);">Unbeatable</span> Prices.</h1>
    <p class="section-subtitle" data-appear data-appear-delay="0.2">High-end, nearly-new mountain bikes at fantastic prices. Part exchange welcome. Every bike checked and ready to ride.</p>
  </section>

  <!-- ═══════════════════ FILTER BAR ═══════════════════ -->
  <section class="section" style="background: var(--surface-base); padding-top: 3rem;">
    <div class="section-inner">

      <!-- Action bar -->
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.5rem;justify-content:flex-end;" data-reveal="fade-up">
        <button class="btn-ghost" data-magnetic data-open-quiz style="font-size:0.8rem;padding:0.5rem 1.25rem;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:0.4rem;"><path d="M12 2L2 19h20L12 2z"/></svg>
          Find Your Size
        </button>
      </div>

      <!-- Brand filters (populated dynamically by shop.js) -->
      <div id="brandFilters" style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:2.5rem;" data-reveal="fade-up">
      </div>

      <style>
        .filter-btn { background: var(--surface-overlay); border: 1px solid var(--border); color: var(--text-secondary); padding: 0.6rem 1.5rem; font-family: 'Oswald', sans-serif; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.15s; }
        .filter-btn:hover { border-color: var(--brand); color: var(--brand); transform: translateY(-2px); }
        .filter-btn.active { background: var(--brand); color: #0A0A0A; border-color: var(--brand); }
        .filter-btn:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }
        .bike-card[data-hidden] { display: none; }
      </style>

      <!-- Bikes grid (will be populated by shop.js) -->
      <div class="bikes-grid" id="shopGrid" data-stagger-parent>
      </div>

    </div>
  </section>

  <!-- ═══════════════════ COMPARE BAR ═══════════════════ -->
  <div id="compareBar" style="position:fixed;bottom:0;left:0;right:0;z-index:800;background:var(--surface-raised);border-top:1px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:center;gap:1rem;transform:translateY(100%);transition:transform 0.3s ease;backdrop-filter:blur(16px);">
    <p style="font-family:Oswald,sans-serif;font-size:0.85rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;">
      <span id="compareBadge" style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:var(--brand);color:#0A0A0A;border-radius:50%;font-size:0.75rem;font-weight:700;margin-right:0.5rem;">0</span>
      bikes selected
    </p>
    <button id="compareBtn" class="btn-primary" data-magnetic style="font-size:0.8rem;padding:0.6rem 1.5rem;">Compare Now</button>
  </div>

  <!-- ═══════════════════ COMPARE MODAL ═══════════════════ -->
  <div id="compareModal" class="modal-overlay">
    <div class="modal-box" style="max-width:900px;">
      <button class="compare-close modal-close" aria-label="Close comparison">&times;</button>
      <h2 style="font-family:Oswald,sans-serif;font-size:1.5rem;color:var(--heading-color);text-transform:uppercase;text-align:center;margin-bottom:2rem;">Bike Comparison</h2>
      <div class="compare-body"></div>
    </div>
  </div>

  <!-- ═══════════════════ SIZING QUIZ MODAL ═══════════════════ -->
  <div id="sizingQuizModal" class="modal-overlay">
    <div class="modal-box" style="max-width:600px;">
      <button class="quiz-close modal-close" aria-label="Close quiz">&times;</button>
      <div class="quiz-progress" style="height:3px;background:var(--surface-overlay);border-radius:2px;margin-bottom:2rem;overflow:hidden;">
        <div class="quiz-progress-fill" style="height:100%;background:var(--brand);width:0;transition:width 0.4s ease;border-radius:2px;"></div>
      </div>
      <h2 class="quiz-title" style="font-family:Oswald,sans-serif;font-size:1.5rem;color:var(--heading-color);text-transform:uppercase;text-align:center;margin-bottom:1.5rem;"></h2>
      <div class="quiz-body"></div>
    </div>
  </div>

  <!-- Footer placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  <script src="animations.js" defer></script>
  <script src="js/includes.js"></script>
  <script src="js/nav.js" defer></script>
  <script src="js/shop.js" defer></script>
  <script src="js/compare.js" defer></script>
  <script src="js/sizing-quiz.js" defer></script>
  <script src="js/ui-extras.js" defer></script>

  <script>
    // Show/hide compare bar based on selection count
    (function() {
      var bar = document.getElementById('compareBar');
      if (!bar) return;
      setInterval(function() {
        if (window.felltraxCompare && window.felltraxCompare.selected.length > 0) {
          bar.style.transform = 'translateY(0)';
        } else {
          bar.style.transform = 'translateY(100%)';
        }
      }, 300);
    })();
  </script>

</body>
</html>
